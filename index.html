const tdee = (w, h, a, g, goal) => {
  const bmr = g === "f" ? 10 * w + 6.25 * h - 5 * a - 161 : 10 * w + 6.25 * h - 5 * a + 5;
  return Math.round(bmr * 1.55) + ((GOALS.find(x => x.id === goal)) || { calMod: 0 }).calMod;
};

const getAITip = (user) => {
  if (!user || !user.weight || !user.height) return "🤖 AI: Start tracking your meals to unlock personalized health insights!";
  const bmi = (+user.weight / ((+user.height / 100) ** 2)).toFixed(1);
  const target = tdee(+user.weight, +user.height, +user.age, user.gender, user.goal);
  const tips = [
    `🤖 AI Coach: Hydration is key! Drinking 500ml of water 30 mins before meals can boost your metabolism.`,
    `🧠 AI Insight: Your daily goal is ${target} kcal. Keep an eye on portion sizes to stay on track.`,
    `⚡ Smart Health: Did you know? Eating protein-rich foods reduces hunger hormone levels naturally.`,
    `🧘 AI Mindfulness: Don't just focus on calories; getting 7-8 hours of sleep helps regulate your weight!`,
  ];
  if (user.goal === 'weight_loss') {
    tips.push(`🔥 AI Coach: To lose weight safely, maintain a deficit of 300-500 kcal today. Avoid sugary drinks!`);
    tips.push(`📉 AI Insight: Your BMI is ${bmi}. Incorporate more fiber (veggies/oats) today to stay full longer without extra calories.`);
  } else if (user.goal === 'muscle_gain') {
    tips.push(`💪 AI Coach: Building muscle requires energy! Make sure you are in a slight caloric surplus today.`);
    tips.push(`🥩 AI Insight: To support muscle recovery, try to consume at least 1.6g of protein per kg of your body weight (${Math.round(user.weight * 1.6)}g total).`);
  } else {
    tips.push(`🌿 AI Coach: Maintenance is about balance. Keep your macros steady and stay active today!`);
  }
  return tips[Math.floor(Math.random() * tips.length)];
};

          {ob.step === 1 && (
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>

          {ob.step === 2 && (

                    <div style={{ ...N, fontWeight: 800, color: C.w, fontSize: 13 }}>{n.label}</div>
                    <div style={{ fontSize: 12, color: C.m, marginTop: 3, lineHeight: 1.5 }}>{n.msg}</div>
                    <div style={{ fontSize: 10, color: C.m2, marginTop: 6 }}>{n.time}</div>
                  </div>
                  {!n.read && <div style={{ width: 9, height: 9, borderRadius: "50%", background: C.g, flexShrink: 0, marginTop: 5, animation: "pulse 1.5s infinite" }} />}
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ══ PROFILE ══ */}
      {tab === "profile" && (
        <div style={{ paddingBottom: 100, height: "100vh", overflowY: "auto" }}>
          <div style={{ padding: "52px 22px 28px", textAlign: "center", background: "linear-gradient(180deg,rgba(12,22,16,0.9) 0%, transparent 100%)" }}>
            <div style={{ position: "relative", display: "inline-block" }}>
              <div style={{ width: 96, height: 96, background: C.gG, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 46, margin: "0 auto", boxShadow: "0 12px 32px rgba(74,222,128,.3)", cursor: "pointer" }} onClick={() => setModal({ type: "avatar" })}>
                {user?.avatar || "😊"}
              </div>
              <div style={{ position: "absolute", bottom: 0, right: 0, background: C.gG, borderRadius: "50%", width: 28, height: 28, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, cursor: "pointer", border: `2px solid ${C.bg}` }} onClick={() => setModal({ type: "avatar" })}>✏️</div>
            </div>
            <div style={{ ...N, color: C.w, fontSize: 24, fontWeight: 900, marginTop: 16 }}>{user?.name}</div>
            <div style={{ color: C.m, fontSize: 14, marginTop: 6 }}>@{user?.username} · +91 {user?.phone}</div>
            <div style={{ color: C.m, fontSize: 12, marginTop: 3 }}>{user?.email}</div>
          </div>
          
          <div style={{ padding: "0 22px" }}>
            
            {/* ✅ NEW: PREMIUM PLAN BUTTON */}
            {!curPlan ? (
              <button onClick={() => setModal({ type: "sub" })} style={{ width: "100%", background: "linear-gradient(135deg, rgba(251,191,36,0.1), rgba(251,191,36,0.05))", border: `1px solid rgba(251,191,36,0.4)`, color: C.gold, padding: "16px", borderRadius: 20, fontWeight: 900, fontSize: 15, marginBottom: 14, boxShadow: "0 8px 24px rgba(251,191,36,0.1)", display: "flex", justifyContent: "center", alignItems: "center", gap: 10 }}>
                👑 Upgrade to Premium Plan
              </button>
            ) : (
               <div style={{ width: "100%", background: "linear-gradient(135deg, rgba(74,222,128,0.1), rgba(74,222,128,0.05))", border: `1px solid rgba(74,222,128,0.4)`, color: C.g, padding: "16px", borderRadius: 20, fontWeight: 900, fontSize: 15, marginBottom: 14, display: "flex", justifyContent: "center", alignItems: "center", gap: 10 }}>
                ⚡ {curPlan.label} Pro Active
              </div>
            )}

            {/* ✅ NEW: HEALTH PROFILE CARD (With Re-Edit Feature) */}
            <div style={{ background: C.card, borderRadius: 20, padding: 16, border: `1px solid ${C.b}`, marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                <div style={{ ...N, color: C.w, fontWeight: 800, fontSize: 15 }}>📊 Health Profile</div>
                <button onClick={() => { setEditProfileData({ age: user?.age||"", weight: user?.weight||"", height: user?.height||"", goal: user?.goal||"general", pref: user?.pref||"all" }); setModal({ type: "editProfile" }); }} style={{ background: "rgba(96,165,250,0.1)", border: "none", color: C.blue, padding: "6px 12px", borderRadius: 10, fontSize: 12, fontWeight: 800 }}>✏️ Edit</button>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <div style={{ background: "rgba(255,255,255,0.03)", padding: "12px", borderRadius: 14, border: `1px solid ${C.b}` }}>
                   <div style={{ fontSize: 11, color: C.m }}>Weight</div>
                   <div style={{ ...N, fontSize: 16, fontWeight: 800, color: C.w, marginTop: 4 }}>{user?.weight || "--"} kg</div>
                </div>
                <div style={{ background: "rgba(255,255,255,0.03)", padding: "12px", borderRadius: 14, border: `1px solid ${C.b}` }}>
                   <div style={{ fontSize: 11, color: C.m }}>Height</div>
                   <div style={{ ...N, fontSize: 16, fontWeight: 800, color: C.w, marginTop: 4 }}>{user?.height || "--"} cm</div>
                </div>
                <div style={{ background: "rgba(255,255,255,0.03)", padding: "12px", borderRadius: 14, border: `1px solid ${C.b}` }}>
                   <div style={{ fontSize: 11, color: C.m }}>BMI Score</div>
                   <div style={{ display: "flex", alignItems:"center", gap: 6, marginTop: 4 }}>
                     <div style={{ ...N, fontSize: 16, fontWeight: 800, color: C.g }}>
                       {user?.weight && user?.height ? (+user.weight / ((+user.height / 100) ** 2)).toFixed(1) : "--"}
                     </div>
                     {user?.weight && user?.height && (
                       <div style={{ fontSize: 9, color: C.bg, fontWeight: 900, background: C.g, padding: "3px 6px", borderRadius: 99 }}>
                         {(+(+user.weight / ((+user.height / 100) ** 2)).toFixed(1)) < 18.5 ? "Low" : (+(+user.weight / ((+user.height / 100) ** 2)).toFixed(1)) < 25 ? "Good" : "High"}
                       </div>
                     )}
                   </div>
                </div>
                <div style={{ background: "rgba(255,255,255,0.03)", padding: "12px", borderRadius: 14, border: `1px solid ${C.b}` }}>
                   <div style={{ fontSize: 11, color: C.m }}>Daily Target</div>
                   <div style={{ ...N, fontSize: 16, fontWeight: 800, color: C.o, marginTop: 4 }}>
                     {user ? tdee(+user.weight||70, +user.height||175, +user.age||25, user.gender||"m", user.goal||"general") : "--"} kcal
                   </div>
                </div>
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                 <div style={{ flex: 1, background: "rgba(74,222,128,0.1)", color: C.g, padding: "10px", borderRadius: 12, fontSize: 12, fontWeight: 700, textAlign: "center", border: `1px solid rgba(74,222,128,0.2)` }}>
                   🎯 {GOALS.find(g => g.id === user?.goal)?.label || "Stay Fit"}
                 </div>
                 <div style={{ flex: 1, background: "rgba(96,165,250,0.1)", color: C.blue, padding: "10px", borderRadius: 12, fontSize: 12, fontWeight: 700, textAlign: "center", border: `1px solid rgba(96,165,250,0.2)` }}>
                   🍽 {PREFS.find(p => p.id === user?.pref)?.label || "Everything"}
                 </div>
              </div>
            </div>

            <div style={{ background: C.card, borderRadius: 20, padding: 16, border: `1px solid ${C.b}`, marginBottom: 14 }}>
              <div style={{ ...N, color: C.w, fontWeight: 800, fontSize: 14, marginBottom: 12 }}>📍 Delivery Address</div>
              <Field value={user?.address || ""} onChange={v => setUser(p => ({ ...p, address: v }))} ph="Enter your full delivery address..." rows={3} />
              <button onClick={saveProfile} style={{ width: "100%", marginTop: 10, background: C.gG, color: "#060c08", border: "none", padding: 13, borderRadius: 12, fontWeight: 800, fontSize: 14, ...N }}>Save Address</button>
            </div>
            
            <div style={{ display: "flex", flexDirection: "column", gap: 12, paddingBottom: 20 }}>
              <button onClick={() => isAdmin ? setTab("admin") : setModal({ type: "adminLogin" })} style={{ background: C.card, border: `1px solid ${C.b}`, color: isAdmin ? C.g : C.w, padding: "16px 20px", borderRadius: 18, fontWeight: 800, fontSize: 15, textAlign: "left", boxShadow: "0 8px 24px rgba(0,0,0,0.2)" }}>
                ⚙️ {isAdmin ? "Admin Panel →" : "Admin Login"}
              </button>
              <button onClick={handleSignOut} style={{ background: "rgba(248,113,113,.08)", border: "1px solid rgba(248,113,113,.25)", color: C.r, padding: "16px 20px", borderRadius: 18, fontWeight: 800, fontSize: 15, textAlign: "left" }}>
                🚪 Sign Out
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ══ ADMIN PANEL ══ */}
      {tab === "admin" && isAdmin && (
        <div style={{ paddingBottom: 100, height: "100vh", overflowY: "auto" }}>
          <div style={{ padding: "52px 22px 18px", background: "linear-gradient(135deg,rgba(16,26,20,0.95),rgba(8,15,28,0.95))" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ color: C.blue, fontSize: 11, fontWeight: 800, letterSpacing: 1.5 }}>⚙️ ADMIN</div>
                <div style={{ ...N, color: C.w, fontSize: 24, fontWeight: 900, marginTop: 4 }}>Control Centre</div>
              </div>
              <button onClick={() => { setIsAdmin(false); setTab("profile"); }} style={{ background: "rgba(248,113,113,.15)", color: C.r, padding: "10px 16px", borderRadius: 20, fontSize: 13, fontWeight: 800, border: "none" }}>Exit</button>
            </div>
          </div>
          <div style={{ padding: "0 22px 16px" }}>
            <div style={{ display: "flex", background: C.card, borderRadius: 16, padding: 5, gap: 4, overflowX: "auto", border: `1px solid ${C.b}` }}>
              {/* ✅ Added Broadcast Tab to Admin */}
              {[["orders", "📦"], ["foods", "🍽"], ["plans", "💳"], ["customers", "👥"], ["stats", "📊"], ["broadcast", "📢"]].map(([k, ic]) => (
                <button key={k} onClick={() => setAdminTab(k)} style={{ flexShrink: 0, padding: "12px 16px", borderRadius: 12, border: "none", background: adminTab === k ? C.blue : "transparent", color: adminTab === k ? "#fff" : C.m, fontWeight: 800, fontSize: 13 }}>
                  {ic} {k.toUpperCase()}
                </button>
              ))}
            </div>
          </div>

          {adminTab === "orders" && (
            <div style={{ padding: "0 22px" }}>
              {allOrders.length === 0 ? (
                <div style={{ textAlign: "center", padding: "40px 0" }}>
                  <div style={{ fontSize: 52 }}>📦</div>
                  <div style={{ color: C.m, fontWeight: 700, marginTop: 12, ...N }}>No orders yet</div>
                </div>
              ) : (
                allOrders.map(order => (
                  <div key={order.id} style={{ background: C.card, borderRadius: 22, marginBottom: 16, border: `1px solid ${order.statusIdx < 4 ? "rgba(74,222,128,.4)" : order.statusIdx === 5 ? C.r : C.b}`, overflow: "hidden", boxShadow: "0 12px 32px rgba(0,0,0,0.25)" }}>
                    <div style={{ background: "rgba(255,255,255,0.03)", padding: "16px 18px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                        <div>
                          <div style={{ ...N, color: C.w, fontWeight: 900, fontSize: 14 }}>#{String(order.id).slice(-8)}</div>
                          <div style={{ fontSize: 12, color: C.m, marginTop: 2 }}>{order.date}</div>
                        </div>
                        <div style={{ ...N, color: C.o, fontWeight: 900, fontSize: 18 }}>₹{order.total}</div>
                      </div>
                      <div style={{ fontSize: 13, color: C.m }}>👤 <span style={{ color: C.w }}>{order.userName}</span> · 📞 <span style={{ color: C.g }}>{order.userPhone}</span></div>
                    </div>
                    <div style={{ padding: "14px 18px 18px" }}>
                      <div style={{ color: order.statusIdx === 5 ? C.r : C.g, fontSize: 12, fontWeight: 800, marginBottom: 10 }}>{ORDER_STEPS[order.statusIdx]?.icon} {ORDER_STEPS[order.statusIdx]?.label}</div>
                      
                      {/* ✅ Admin Action Buttons (Update & Cancel) */}
                      {order.statusIdx < 4 ? (
                        <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
                          <button onClick={() => updateOrder(order.id)} style={{ flex: 2, background: C.gG, color: "#060c08", border: "none", padding: "12px", borderRadius: 14, fontWeight: 900, fontSize: 13, ...N, boxShadow: "0 6px 20px rgba(74,222,128,0.3)" }}>
                            Update → {ORDER_STEPS[order.statusIdx + 1]?.icon}
                          </button>
                          <button onClick={() => cancelOrder(order.id, true)} style={{ flex: 1, background: "transparent", border: `1px solid ${C.r}`, color: C.r, padding: "12px", borderRadius: 14, fontWeight: 800, fontSize: 13, ...N }}>Cancel</button>
                        </div>
                      ) : (
                        <div style={{ background: order.statusIdx === 5 ? "rgba(248,113,113,.1)" : "rgba(74,222,128,.1)", border: `1px solid ${order.statusIdx === 5 ? "rgba(248,113,113,.2)" : "rgba(74,222,128,.2)"}`, borderRadius: 14, padding: "12px", textAlign: "center", color: order.statusIdx === 5 ? C.r : C.g, fontSize: 13, fontWeight: 800, ...N }}>
                          {order.statusIdx === 5 ? "🚫 Cancelled" : "✅ Delivered!"}
                        </div>
                      )}
                    </div>
                  </div>
                ))
              )}
            </div>
          )}

          {adminTab === "foods" && (
            <div style={{ padding: "0 22px" }}>
              <button onClick={() => setFoodModal({ goal: "general", meal: "breakfast", data: { name: "", desc: "", price: "", cal: "", emoji: "🍲", tag: "New", p: 0, c: 0, f: 0, time: "10m" } })} style={{ background: C.gG, color: "#060c08", padding: "14px 16px", width: "100%", borderRadius: 16, fontWeight: 900, border: "none", marginBottom: 24, fontSize: 15, ...N, boxShadow: "0 8px 24px rgba(74,222,128,0.3)" }}>
                + Add New Food Item
              </button>
              {GOALS.map(goal => (
                <div key={goal.id} style={{ marginBottom: 26 }}>
                  <div style={{ ...N, color: C.w, fontWeight: 900, fontSize: 16, marginBottom: 12 }}>{goal.icon} {goal.label}</div>
                  {MEALS.map(meal => (
                    <div key={meal} style={{ marginBottom: 14 }}>
                      <div style={{ fontSize: 11, fontWeight: 800, color: C.m, textTransform: "uppercase", marginBottom: 8, letterSpacing: 1.2 }}>{MIC[meal]} {meal} ({(foods[goal.id]?.[meal] || []).length})</div>
                      {(foods[goal.id]?.[meal] || []).map(item => (
                        <div key={item.id} style={{ background: C.card, borderRadius: 16, padding: "12px 14px", marginBottom: 8, border: `1px solid ${C.b}`, display: "flex", alignItems: "center", gap: 12, opacity: !item.active ? 0.5 : 1 }}>
                          <span style={{ fontSize: 24, flexShrink: 0 }}>{item.emoji}</span>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ ...N, fontWeight: 800, color: C.w, fontSize: 14 }}>{item.name}</div>
                          </div>
                          <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                            <button onClick={() => setFoodModal({ goal: goal.id, meal: meal, data: item })} style={{ background: "rgba(96,165,250,.15)", border: "none", color: C.blue, width: 32, height: 32, borderRadius: 10, fontSize: 13 }}>✏️</button>
                            <button onClick={() => toggleProp(goal.id, meal, item.id, "stock")} style={{ background: item.stock ? "rgba(74,222,128,.15)" : "rgba(248,113,113,.15)", border: "none", color: item.stock ? C.g : C.r, width: 32, height: 32, borderRadius: 10 }}>{item.stock ? "📦" : "🚫"}</button>
                            <button onClick={() => toggleProp(goal.id, meal, item.id, "active")} style={{ background: item.active ? "rgba(74,222,128,.15)" : "rgba(100,100,100,.15)", border: "none", color: item.active ? C.g : C.m, width: 32, height: 32, borderRadius: 10, fontSize: 14 }}>{item.active ? "👁" : "🙈"}</button>
                            <button onClick={() => deleteFood(goal.id, meal, item.id, item.name)} style={{ background: "rgba(248,113,113,.15)", border: "none", color: C.r, width: 32, height: 32, borderRadius: 10 }}>🗑</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              ))}
            </div>
          )}

          {adminTab === "plans" && (
            <div style={{ padding: "0 22px" }}>
              {plans.map(plan => (
                <div key={plan.id} style={{ background: C.card, borderRadius: 22, padding: "20px", marginBottom: 16, border: `1px solid ${C.b}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div>
                      <div style={{ ...N, color: C.w, fontWeight: 900, fontSize: 18 }}>{plan.label}</div>
                      <div style={{ color: C.o, fontWeight: 900, fontSize: 22, marginTop: 4 }}>₹{plan.price}<span style={{ fontSize: 12, color: C.m }}>/{plan.per}</span></div>
                    </div>
                    <button onClick={() => setPlanModal({ ...plan, features: plan.features || [] })} style={{ background: "rgba(96,165,250,.15)", border: "none", color: C.blue, padding: "8px 16px", borderRadius: 12, fontWeight: 800, fontSize: 13 }}>✏️ Edit Plan</button>
                  </div>
                  <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.b}` }}>
                    {plan.features.map((f, i) => <div key={i} style={{ fontSize: 12, color: C.m, marginBottom: 6 }}>✓ {f}</div>)}
                  </div>
                </div>
              ))}
            </div>
          )}

          {adminTab === "customers" && (
            <div style={{ padding: "0 22px" }}>
              <div style={{ ...N, color: C.w, fontWeight: 900, fontSize: 16, marginBottom: 16 }}>👥 Users ({allUsers.length})</div>
              {allUsers.map(u => (
                <div key={u.uid} style={{ background: C.card, borderRadius: 20, padding: "18px", marginBottom: 14, border: `1px solid ${C.b}` }}>
                  <div style={{ ...N, color: C.w, fontWeight: 900, fontSize: 15 }}>{u.name}</div>
                  <div style={{ color: C.m, fontSize: 13, marginTop: 4 }}>{u.email} · +91 {u.phone}</div>
                </div>
              ))}
            </div>
          )}

          {/* ✅ Admin Stats & Delivery Settings Tab */}
          {adminTab === "stats" && (
            <div style={{ padding: "0 22px" }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 18 }}>
                {[["📦", "Orders", orders.length, C.g], ["💰", "Revenue", "₹" + orders.reduce((s, o) => s + o.total, 0), C.o], ["👥", "Users", allUsers.length, C.pur], ["🍽", "Items", allFlat.length, C.blue]].map(([ic, l, v, col]) => (
                  <div key={l} style={{ background: C.card, borderRadius: 18, padding: "16px", border: `1px solid ${C.b}` }}>
                    <div style={{ fontSize: 22 }}>{ic}</div>
                    <div style={{ ...N, color: col, fontSize: 24, fontWeight: 900, marginTop: 6 }}>{v}</div>
                    <div style={{ color: C.m, fontSize: 11, marginTop: 3 }}>{l}</div>
                  </div>
                ))}
              </div>

              {/* ✅ Delivery Fee Dynamic Settings Panel */}
              <div style={{ background: C.card, border: `1px solid ${C.b}`, borderRadius: 18, padding: "18px", marginBottom: 18 }}>
                <div style={{ color: C.w, fontWeight: 900, fontSize: 15, ...N, marginBottom: 14 }}>🛵 Delivery Settings</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>
                  <Field label="Delivery Fee (₹)" type="number" value={stgCharge} onChange={setStgCharge} />
                  <Field label="Free Min Order (₹)" type="number" value={stgFreeMin} onChange={setStgFreeMin} />
                </div>
                <button onClick={updateSettings} style={{ width: "100%", background: "rgba(96,165,250,.15)", color: C.blue, padding: "12px", borderRadius: 12, fontWeight: 800, fontSize: 13, ...N, border: "none" }}>
                  💾 Update Delivery Settings
                </button>
              </div>
            </div>
          )}

          {/* ✅ NEW: Admin Broadcast Tab */}
          {adminTab === "broadcast" && (
            <div style={{ padding: "0 22px" }}>
              <div style={{ background: C.card, border: `1px solid ${C.b}`, borderRadius: 18, padding: "18px", marginBottom: 18 }}>
                <div style={{ color: C.w, fontWeight: 900, fontSize: 15, ...N, marginBottom: 14 }}>📢 Broadcast Announcement</div>
                <div style={{ color: C.m, fontSize: 12, marginBottom: 16 }}>Send a global notification alert to all your customers instantly.</div>
                <Field label="Message Content" value={broadcastMsg} onChange={setBroadcastMsg} ph="e.g. 50% Offer valid only for today!" rows={3} />
                <button onClick={handleBroadcast} style={{ width: "100%", marginTop: 12, background: C.gG, color: "#060c08", padding: "14px", borderRadius: 14, fontWeight: 900, fontSize: 14, ...N, border: "none", boxShadow: "0 8px 24px rgba(74,222,128,.3)" }}>
                  🚀 Send to All Users
                </button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ✅ PERFECTED PREMIUM BOTTOM NAV (WITH NOTIFS BUTTON) */}
      <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: "linear-gradient(to top, rgba(6,12,8,0.98) 50%, rgba(6,12,8,0.85))", backdropFilter: "blur(24px)", borderTop: `1px solid rgba(74,222,128,0.1)`, display: "flex", padding: "10px 0 24px", zIndex: 200, boxShadow: "0 -10px 30px rgba(0,0,0,0.5)" }}>
        {NavBtn("home", "🏠", "Home", 0)}
        {NavBtn("menu", "🍽", "Menu", 0)}
        {NavBtn("cart", "🛒", "Cart", cartCount)}
        {NavBtn("track", "🛵", "Track", liveOrders)}
        {NavBtn("notifs", "🔔", "Alerts", unread)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
// ✅ Service Worker — works on any HTTPS domain
if("serviceWorker" in navigator && location.protocol === "https:"){
  navigator.serviceWorker.register("sw.js").then(()=>console.log("✅ SW registered")).catch(e=>console.log("SW:",e));
}
</script>
</body>
</html>
